[theme]
# Primary color (Buttons, active elements)
primaryColor = "#2563eb"

# Background color (Main body)
backgroundColor = "#ffffff"

# Sidebar and Input background color
secondaryBackgroundColor = "#f8fafc"

# Text color
textColor = "#1e293b"

# Font (sans serif is clean and modern)
font = "sans serif"

[server]
# Port settings (deployment ke liye default rakhein)
port = 8501

[browser]
# Ye ensure karta hai ki aapki app ka title tab mein sahi dikhe
gatherUsageStats = false